services:
  web:
    image: nginx:1.27-alpine
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www/html:cached
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    restart: unless-stopped

  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    volumes:
      - ./:/var/www/html:cached
      - cake-tmp:/var/www/html/tmp
      - cake-logs:/var/www/html/logs
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: "postgres://kanban:kanban@db:5432/kanban"
      DATABASE_TEST_URL: "postgres://kanban:kanban@db:5432/test_kanban"
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: kanban
      POSTGRES_USER: kanban
      POSTGRES_PASSWORD: kanban
    volumes:
      - db-data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kanban -d kanban"]
      interval: 3s
      timeout: 3s
      retries: 10
    restart: unless-stopped

volumes:
  db-data:
  cake-tmp:
  cake-logs:
